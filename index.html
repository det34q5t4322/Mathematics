<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PassForge v3.5 — Криптографический Анализатор</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet" />
  
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
</head>
<body class="theme-default">
  <div class="grid-bg"></div>
  <div class="scanlines"></div>

  <header class="main-header">
    <div class="header-left">
      <h1 class="logo">[PASSFORGE]<span>v3.5</span></h1>
      <nav class="tabs-nav">
        <button class="tab-btn active" data-tab="generator">⚡ ГЕНЕРАТОР</button>
        <button class="tab-btn" data-tab="analysis">📊 АНАЛИЗ</button>
      </nav>
    </div>
    <div class="header-right">
      <button id="openSettings" class="btn-settings">⚙️ НАСТРОЙКИ</button>
    </div>
  </header>

  <aside id="settingsPanel" class="settings-panel">
    <div class="settings-header">
      <h3>КОНФИГУРАЦИЯ</h3>
      <button id="closeSettings">×</button>
    </div>
    <div class="settings-body">
      <div class="s-group">
        <label>Цветовая схема</label>
        <select id="themeSelect">
          <option value="default">Deep Space (Синий)</option>
          <option value="graphite">Graphite (Серый)</option>
          <option value="nord">Nord (Голубой)</option>
          <option value="emerald">Emerald (Зеленый)</option>
        </select>
      </div>
      <div class="s-group">
        <label>Размер шрифта: <span id="fsVal">16px</span></label>
        <input type="range" id="fontSlider" min="12" max="22" value="16">
      </div>
      <div class="s-group">
        <label>Прозрачность блоков</label>
        <input type="range" id="opacitySlider" min="10" max="100" value="80">
      </div>
      <div class="s-group">
        <label class="toggle">
          <input type="checkbox" id="tipsToggle" checked>
          <span>Включить подсказки (?)</span>
        </label>
      </div>
    </div>
  </aside>

  <main class="main-content">
    <section id="tab-generator" class="tab-page active">
      <div class="generator-grid">
        <div class="card config-card">
          <h2 class="card-title">ПАРАМЕТРЫ ПАРОЛЯ</h2>
          <div class="config-row">
            <label>Длина: <strong id="lenDisplay">24</strong></label>
            <input type="range" id="passLen" min="6" max="128" value="24">
          </div>
          <div class="checkbox-grid">
            <label><input type="checkbox" id="upper" checked> A-Z</label>
            <label><input type="checkbox" id="lower" checked> a-z</label>
            <label><input type="checkbox" id="digits" checked> 0-9</label>
            <label><input type="checkbox" id="special"> !@#$</label>
          </div>
          <div class="config-row">
            <label>Алгоритм:</label>
            <select id="algoSelect">
              <option value="lcg">LCG (PRNG)</option>
              <option value="crypto">Crypto API (CSPRNG)</option>
              <option value="mouse">Mouse TRNG</option>
            </select>
          </div>
          <div id="mousePool" class="mouse-pool-box" style="display:none;">
            <div class="pool-bar"><div id="poolFill"></div></div>
            <p>Двигайте мышью: <span id="poolStatus">0%</span></p>
          </div>
          <button id="btnGenerate" class="btn-primary">СГЕНЕРИРОВАТЬ ПАРОЛЬ</button>
        </div>

        <div class="card result-card">
          <h2 class="card-title">РЕЗУЛЬТАТ</h2>
          <div class="result-box">
            <input type="text" id="passOutput" readonly placeholder="Пароль...">
            <button id="btnCopy">КОПИРОВАТЬ</button>
          </div>
          <div class="strength-meter">
            <div id="strengthFill"></div>
          </div>
          <p id="strengthLabel">Надежность: ---</p>
        </div>
      </div>
    </section>

    <section id="tab-analysis" class="tab-page">
      <div class="analysis-grid">
        <div class="metrics-row">
          <div class="metric-card">
            <span class="m-title">ЭНТРОПИЯ <i class="tip" data-tip="entropy">?</i></span>
            <span class="m-value" id="valEntropy">0.00</span>
          </div>
          <div class="metric-card">
            <span class="m-title">МАТ. ОЖИДАНИЕ <i class="tip" data-tip="math">?</i></span>
            <span class="m-value" id="valMath">0.00</span>
          </div>
          <div class="metric-card">
            <span class="m-title">ДИСПЕРСИЯ <i class="tip" data-tip="disp">?</i></span>
            <span class="m-value" id="valDisp">0.00</span>
          </div>
        </div>

        <div class="charts-row">
          <div class="card chart-container">
            <h3>ГИСТОГРАММА ЧАСТОТ</h3>
            <canvas id="freqChart"></canvas>
          </div>
          <div class="card chart-container">
            <h3>ФАЗОВАЯ ПЛОСКОСТЬ</h3>
            <canvas id="phaseChart"></canvas>
          </div>
        </div>

        <div class="card log-card">
          <h3>КРИПТОГРАФИЧЕСКИЙ ЛОГ</h3>
          <div id="mathLog" class="math-log-content">Ожидание данных...</div>
        </div>
      </div>
    </section>
  </main>

  <footer class="main-footer">
    <span>[ PassForge v3.5 ]</span>
    <span>Студент: Утебалиев А.А. (ИСС9-125)</span>
  </footer>

  <script src="app.js"></script>
</body>
</html>
